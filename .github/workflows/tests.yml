name: Tests

on:
  push:
  pull_request:

jobs:
  test:

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install -r requirements.txt

      - name: Show installed packages
        run: |
          pip show fastapi
          pip show starlette
          pip show httpx
          pip show httpx2

      - run: pytest